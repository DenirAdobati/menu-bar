<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Menu digitale elegante per Beautrì">
    <meta name="theme-color" content="#FAFAFA">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <title>Beautrì - Menu</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;800;900&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            borderRadius: { apple: '1.5rem' },
            keyframes: {
              fadeIn: {
                '0%':   { opacity: '0', transform: 'translateY(8px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
            animation: { 'fade-in': 'fadeIn 0.4s ease-out forwards' }
          }
        }
      }
    </script>

    <style>
      :root {
        --gold:       #EAB30A;
        --dark:       #1A1A1A;
        --bg:         #FAFAFA;
        --ivory:      #F8F6F2;
        --gold-tint:  #FFF8E6;
        --text-dark:  #1A1A1A;
        --text-mid:   #374151;
        --text-light: #6B7280;
        --border:     rgba(0,0,0,0.07);
      }

      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

      body {
        background-color: var(--bg);
        background-image:
          linear-gradient(rgba(0,0,0,0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,0,0,0.045) 1px, transparent 1px);
        background-size: 40px 40px;
        color: var(--text-dark);
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .font-poppins { font-family: 'Poppins', sans-serif; }

      /* Pill glass navbar */
      .navbar-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 1.1rem;
        background: rgba(250,250,250,0.88);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(0,0,0,0.09);
        border-radius: 9999px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      }

      /* Decorative tag */
      .deco-tag {
        font-family: 'Poppins', sans-serif;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-mid);
        background: #fff;
        border: 1px solid rgba(0,0,0,0.09);
        border-radius: 9999px;
        padding: 0.28rem 0.9rem;
        display: inline-block;
      }

      /* Card hover lift */
      .card-lift {
        transition: transform 0.22s ease, box-shadow 0.22s ease;
      }
      .card-lift:hover  { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.11) !important; }
      .card-lift:active { transform: scale(0.98); }

      /* Badge blink */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
      }
      .badge-blink { animation: blink 1.2s ease-in-out infinite; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!--
      ARCHITETTURA CORRETTA:
      #sticky-header  → SEMPRE compatto (~60px). Solo brand pill o category pill.
                        Non contiene mai il contenuto hero.
      #hero-section   → Scorre normalmente con la pagina. Contiene H1 e sottotitolo.
                        Visibile solo in home view. Nessuna manipolazione opacity.
      #menu-container → Lista pulsanti / card prodotti.
    -->

    <!-- Sticky Header: compatto, solo navigazione -->
    <div id="sticky-header"
         style="position:sticky;top:0;z-index:50;transition:background 0.3s ease,box-shadow 0.3s ease,padding 0.3s ease;padding:0.75rem 0">
        <div style="max-width:42rem;margin:0 auto;padding:0 1.5rem">
            <div id="header-nav" style="display:flex;align-items:center;gap:0.75rem"></div>
        </div>
    </div>

    <!-- Hero Section: nel flusso normale della pagina, scorre con il contenuto -->
    <div id="hero-section" style="max-width:42rem;margin:0 auto;padding:0 1.5rem"></div>

    <!-- Main Content -->
    <main style="max-width:42rem;margin:0 auto;padding:0 1.5rem;min-height:60vh">
        <div id="menu-container"></div>
    </main>

    <script>
        const CATEGORIES = [
            { id: 'novita',   label: 'NOVITÀ ESTATE 2026',                                    symbol: '🍹' },
            { id: 'coffee',   label: 'Il caffè della bellezza',                                symbol: '☕' },
            { id: 'tea',      label: 'Rilassati con un buon tè e scopri i nostri sapori unici', symbol: '🫖' },
            { id: 'infusion', label: 'Infusi e tisane per rilassarti e trovare benessere',      symbol: '🌿' },
            { id: 'sweet',    label: 'Per addolcire la tua coccola', iconName: 'candy' },
        ];

        const MENU_ITEMS = [
            { id: 'c1',  categoryId: 'coffee',   icon: '☕',  name: 'Caffè' },
            { id: 'c2',  categoryId: 'coffee',   icon: '☕',  name: 'Caffè lungo' },
            { id: 'c3',  categoryId: 'coffee',   icon: '☕',  name: 'Caffè corto' },
            { id: 'c4',  categoryId: 'coffee',   icon: '🧊',  name: 'Caffè macchiato freddo' },
            { id: 'c5',  categoryId: 'coffee',   icon: '🇺🇸', name: 'Caffè americano' },
            { id: 'c6',  categoryId: 'coffee',   icon: '🌰',  name: 'Caffè con Nutella' },
            { id: 't4',  categoryId: 'tea',      icon: '🌲',  name: 'Tè Verde al gelsomino' },
            { id: 't8',  categoryId: 'tea',      icon: '🫐',  name: 'Tè Verde ai Frutti di Bosco', ingredients: 'fragola, ciliegie, lampone' },
            { id: 't10', categoryId: 'tea',      icon: '🫖',  name: 'Tè Nero' },
            { id: 't11', categoryId: 'tea',      icon: '🌿',  name: 'Tè Nero',               ingredients: 'con cardamomo verde' },
            { id: 't12', categoryId: 'tea',      icon: '🍵',  name: 'Tè Verde Deteinato' },
            { id: 'i5',  categoryId: 'infusion', icon: '🏝️', name: 'Infuso Esotico',         ingredients: 'ananas, mela, cocco, banana, lavanda, petali di rosa' },
            { id: 'i6',  categoryId: 'infusion', icon: '🥝',  name: 'Infuso Kiwi & Fragola' },
            { id: 'i7',  categoryId: 'infusion', icon: '💆',  name: 'Infuso Benessere',       ingredients: 'finocchio, comino, menta, rosmarino, tarassaco, Melissa, liquirizia' },
            { id: 'i8',  categoryId: 'infusion', icon: '🥭',  name: 'Infuso Gelato di Mango', ingredients: 'ananas, carota, albicocca' },
            { id: 'i9',  categoryId: 'infusion', icon: '🍇',  name: 'Infuso Uva & Mela',     ingredients: 'arancia' },
            { id: 'i10', categoryId: 'infusion', icon: '🫐',  name: 'Infuso Frutti di Bosco', ingredients: 'ibisco, uva, mela, more, ciliegia, lampone, fragola' },
            { id: 'i11', categoryId: 'infusion', icon: '🍎',  name: 'Infuso Fresco Fruttato', ingredients: 'mela, menta, limone, papaya, arancia, kiwi' },
            // Novità Estate 2026
            { id: 'n1', categoryId: 'novita', icon: '🌿', name: 'Menta zero' },
            { id: 'n2', categoryId: 'novita', icon: '🍃', name: 'Menta' },
            { id: 'n3', categoryId: 'novita', icon: '🍋', name: 'Limone' },
            { id: 'n4', categoryId: 'novita', icon: '🌾', name: 'Orzata' },
            { id: 'n5', categoryId: 'novita', icon: '🌸', name: 'Fiori di sambuco' },
            { id: 'n6', categoryId: 'novita', icon: '🫐', name: 'Mirtillo' },
            { id: 'n7', categoryId: 'novita', icon: '🍓', name: 'Lampone' },
            { id: 'n8', categoryId: 'novita', icon: '🍒', name: 'Amarena' },
            // Dolcezza
            { id: 's1',  categoryId: 'sweet',    icon: '🥢',  name: 'Zucchero di Canna',     ingredients: 'Integrale grezzo' },
            { id: 's2',  categoryId: 'sweet',    icon: '🧂',  name: 'Zucchero Bianco',        ingredients: 'Classico raffinato' },
            { id: 's3',  categoryId: 'sweet',    icon: '🍯',  name: "Miele d'Acacia",    ingredients: 'Naturale e delicato' },
        ];

        const app = {
            state: { view: 'home', scrolled: false },

            init() {
                this.setupScrollListener();
                this.render();
            },

            setupScrollListener() {
                window.addEventListener('scroll', () => {
                    const isScrolled = window.scrollY > 20;
                    if (this.state.scrolled !== isScrolled) {
                        this.state.scrolled = isScrolled;
                        this.updateHeaderStyle();
                    }
                });
            },

            // Gestisce solo il glass/transparent della navbar compatta.
            // NON manipola mai l'hero: esso scorre naturalmente con la pagina.
            updateHeaderStyle() {
                const header = document.getElementById('sticky-header');
                const isHome = this.state.view === 'home';
                if (this.state.scrolled) {
                    header.style.background          = 'rgba(250,250,250,0.95)';
                    header.style.backdropFilter       = 'blur(14px)';
                    header.style.webkitBackdropFilter = 'blur(14px)';
                    header.style.boxShadow            = '0 1px 14px rgba(0,0,0,0.08)';
                    header.style.paddingTop           = '0.5rem';
                    header.style.paddingBottom        = '0.5rem';
                } else {
                    header.style.background          = 'transparent';
                    header.style.backdropFilter       = 'none';
                    header.style.webkitBackdropFilter = 'none';
                    header.style.boxShadow            = 'none';
                    header.style.paddingTop           = isHome ? '0.75rem' : '1.75rem';
                    header.style.paddingBottom        = isHome ? '0.75rem' : '1rem';
                }
            },

            setView(viewId) {
                this.state.view = viewId;
                window.scrollTo(0, 0);
                this.state.scrolled = false;
                this.render();
            },

            // Aggiorna la navbar compatta (sempre piccola) e la sezione hero separata.
            updateHeaderText() {
                const nav  = document.getElementById('header-nav');
                const hero = document.getElementById('hero-section');
                const cat  = CATEGORIES.find(c => c.id === this.state.view);

                if (this.state.view === 'home') {
                    // Navbar: vuota in home (nessun brand pill)
                    nav.innerHTML = '';
                    // Hero: nel flusso della pagina, scorre normalmente
                    hero.innerHTML = `
                        <div style="text-align:center;padding:1.75rem 0 0.5rem;animation:fadeIn 0.4s ease-out both">
                            <div style="margin-bottom:1.1rem">
                                <span class="deco-tag">• MENÙ DELLE COCCOLE •</span>
                            </div>
                            <h1 class="font-poppins" style="font-size:clamp(1.9rem,7vw,3rem);font-weight:900;color:#1A1A1A;line-height:1.08;margin-bottom:0.85rem;letter-spacing:-0.025em">
                                Ogni percorso da<br><span style="color:#EAB30A">Beautrì</span> è unico,<br>come te.
                            </h1>
                            <p style="font-size:0.93rem;color:#6B7280;line-height:1.65;max-width:26rem;margin:0 auto 0.25rem">
                                Quale dettaglio renderebbe la tua esperienza<br>di oggi <strong style="color:#1A1A1A;font-weight:600">indimenticabile</strong>?
                            </p>
                        </div>
                    `;
                } else if (cat) {
                    // Navbar: back button + category pill
                    nav.innerHTML = `
                        <button onclick="app.setView('home')"
                            style="display:flex;align-items:center;gap:0.35rem;padding:0.42rem 0.85rem 0.42rem 0.55rem;background:#F8F6F2;border:1px solid rgba(0,0,0,0.08);border-radius:9999px;cursor:pointer;transition:background 0.2s;font-family:Inter,sans-serif;font-size:0.82rem;color:#374151;font-weight:500;flex-shrink:0"
                            onmouseenter="this.style.background='rgba(234,179,10,0.12)'"
                            onmouseleave="this.style.background='#F8F6F2'">
                            <i data-lucide="chevron-left" style="width:0.9rem;height:0.9rem;color:#374151"></i>
                            Menu
                        </button>
                        <div style="display:inline-flex;align-items:center;gap:0.55rem;padding:0.45rem 1rem;background:#F8F6F2;border:1px solid rgba(234,179,10,0.28);border-radius:9999px;box-shadow:0 1px 8px rgba(0,0,0,0.05);animation:fadeIn 0.3s ease-out both;overflow:hidden;min-width:0">
                            <span style="font-size:1.1rem;line-height:1;flex-shrink:0">${cat.symbol}</span>
                            <span class="font-poppins" style="font-size:0.85rem;font-weight:700;color:#1A1A1A;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cat.label}</span>
                        </div>
                    `;
                    // Hero: vuoto nelle viste categoria
                    hero.innerHTML = '';
                }
            },

            render() {
                this.updateMainLayout();
                this.updateHeaderText();
                this.updateHeaderStyle();
                this.renderContent();
                lucide.createIcons();
            },

            updateMainLayout() {
                const main       = document.querySelector('main');
                const hero       = document.getElementById('hero-section');
                const navWrapper = document.querySelector('#sticky-header > div');
                if (this.state.view === 'home') {
                    main.style.maxWidth       = '42rem';
                    main.style.padding        = '0 1.5rem';
                    hero.style.maxWidth       = '42rem';
                    navWrapper.style.maxWidth = '42rem';
                    navWrapper.style.padding  = '0 1.5rem';
                } else {
                    main.style.maxWidth       = '56rem';
                    main.style.padding        = '0 2rem 3rem';
                    hero.style.maxWidth       = '56rem';
                    navWrapper.style.maxWidth = '56rem';
                    navWrapper.style.padding  = '0 2rem';
                }
            },

            getCategoryStyle(id) {
                if (id === 'novita') {
                    return {
                        bg:         '#FFF8E6',
                        border:     '1px solid rgba(234,179,10,0.38)',
                        shadow:     '0 3px 14px rgba(234,179,10,0.1)',
                        iconBg:     'rgba(234,179,10,0.18)',
                        labelColor: '#1A1A1A',
                        arrowBg:    '#EAB30A',
                        arrowColor: '#1A1A1A',
                        padV:       '1.45rem',
                        badge: `<span class="badge-blink" style="position:absolute;top:-0.7rem;right:-0.5rem;z-index:20;background:#FF2222;color:#fff;font-family:Poppins,sans-serif;font-size:0.72rem;font-weight:700;padding:0.3rem 0.72rem;border-radius:9999px;letter-spacing:0.1em;box-shadow:0 3px 12px rgba(255,34,34,0.55),0 1px 3px rgba(0,0,0,0.18);transform:rotate(-15deg)">NEW</span>`,
                    };
                }
                return {
                    bg:         '#ffffff',
                    border:     '1px solid rgba(0,0,0,0.07)',
                    shadow:     '0 2px 12px rgba(0,0,0,0.05)',
                    iconBg:     'rgba(234,179,10,0.10)',
                    labelColor: '#1A1A1A',
                    arrowBg:    '#F3F3F3',
                    arrowColor: '#6B7280',
                    padV:       '1.1rem',
                    badge:      '',
                };
            },

            renderContent() {
                const container = document.getElementById('menu-container');
                container.innerHTML = '';

                if (this.state.view === 'home') {
                    const cats = CATEGORIES.filter(c => c.id !== 'sweet');
                    const grid = document.createElement('div');
                    grid.style.cssText = 'display:grid;gap:0.75rem;padding-top:1.4rem;padding-bottom:2rem';

                    cats.forEach((cat, i) => {
                        const s   = this.getCategoryStyle(cat.id);
                        const btn = document.createElement('button');
                        btn.className = 'card-lift';
                        btn.setAttribute('onclick', `app.setView('${cat.id}')`);
                        btn.style.cssText = `
                            position:relative;display:flex;align-items:center;gap:1rem;
                            padding:${s.padV} 1.1rem;width:100%;text-align:left;cursor:pointer;
                            background:${s.bg};border:${s.border};border-radius:1.15rem;
                            box-shadow:${s.shadow};
                            animation:fadeIn 0.4s ease-out ${i * 65}ms both
                        `;
                        btn.innerHTML = `
                            ${s.badge}
                            <div style="width:3rem;height:3rem;display:flex;align-items:center;justify-content:center;border-radius:0.8rem;background:${s.iconBg};flex-shrink:0">
                                <span style="font-size:1.5rem;line-height:1">${cat.symbol}</span>
                            </div>
                            <div style="flex:1;min-width:0">
                                <span class="font-poppins" style="display:block;font-size:0.95rem;font-weight:600;color:${s.labelColor};line-height:1.3">${cat.label}</span>
                            </div>
                            <div style="width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;border-radius:50%;background:${s.arrowBg};flex-shrink:0">
                                <i data-lucide="arrow-right" style="width:0.85rem;height:0.85rem;color:${s.arrowColor}"></i>
                            </div>
                        `;
                        grid.appendChild(btn);
                    });
                    container.appendChild(grid);

                } else {
                    const items    = MENU_ITEMS.filter(i => i.categoryId === this.state.view);

                    if (this.state.view === 'novita') {
                        const titleBox = document.createElement('div');
                        titleBox.style.cssText = 'padding-top:2rem;padding-bottom:1rem;animation:fadeIn 0.35s ease-out both';
                        titleBox.innerHTML = `
                            <div style="display:flex;align-items:center;gap:0.6rem">
                                <div style="padding:0.45rem;background:rgba(234,179,10,0.15);border-radius:0.55rem;color:#EAB30A;display:flex">
                                    <span style="font-size:1rem;line-height:1">☀️</span>
                                </div>
                                <span class="font-poppins" style="font-size:0.95rem;font-weight:700;color:#1A1A1A">
                                    Rinfresca la tua estate con i seguenti gusti
                                </span>
                            </div>
                        `;
                        container.appendChild(titleBox);
                    }

                    const itemGrid = document.createElement('div');
                    itemGrid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,19rem),1fr));gap:1rem 1.5rem;padding-top:0.5rem;padding-bottom:1.5rem;animation:fadeIn 0.35s ease-out both';
                    itemGrid.innerHTML = items.map(item => this.createCardHtml(item)).join('');
                    container.appendChild(itemGrid);

                    if (this.state.view === 'novita') return;

                    const sweetCat   = CATEGORIES.find(c => c.id === 'sweet');
                    const sweetItems = MENU_ITEMS.filter(i => i.categoryId === 'sweet');
                    const sweetBox   = document.createElement('div');
                    sweetBox.style.cssText = 'margin-top:3rem;padding-bottom:1.5rem;animation:fadeIn 0.4s ease-out 120ms both';
                    sweetBox.innerHTML = `
                        <div style="background:#FFF8E6;border:1px solid rgba(234,179,10,0.22);border-radius:1.15rem;padding:1.75rem 2rem">
                            <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem">
                                <div style="padding:0.45rem;background:rgba(234,179,10,0.15);border-radius:0.55rem;color:#EAB30A;display:flex">
                                    <i data-lucide="candy" style="width:1rem;height:1rem"></i>
                                </div>
                                <span class="font-poppins" style="font-size:0.95rem;font-weight:700;color:#1A1A1A">
                                    ${sweetCat ? sweetCat.label : 'Per addolcire la tua coccola'}
                                </span>
                            </div>
                            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,16rem),1fr));gap:0.6rem">
                                ${sweetItems.map(item => this.createCardHtml(item, true)).join('')}
                            </div>
                        </div>
                    `;
                    container.appendChild(sweetBox);
                }
            },

            createCardHtml(item, isSweet = false) {
                const border  = isSweet ? 'rgba(234,179,10,0.15)' : 'rgba(0,0,0,0.07)';
                const iconBg  = isSweet ? 'rgba(234,179,10,0.12)' : '#F3F3F3';
                return `
                    <div class="card-lift" style="background:#fff;border:1px solid ${border};border-radius:0.95rem;padding:1.25rem 1.5rem;box-shadow:0 1px 6px rgba(0,0,0,0.04);min-height:4.5rem;display:flex;align-items:center">
                        <div style="display:flex;align-items:center;gap:1rem;width:100%">
                            <span style="font-size:1.5rem;width:3.2rem;height:3.2rem;display:flex;align-items:center;justify-content:center;border-radius:0.75rem;background:${iconBg};flex-shrink:0;line-height:1">${item.icon}</span>
                            <div style="min-width:0">
                                <p class="font-poppins" style="font-size:0.92rem;font-weight:700;color:#1A1A1A;line-height:1.3;margin-bottom:0.2rem">${item.name}</p>
                                ${item.ingredients ? `<p style="font-size:0.78rem;color:#6B7280;line-height:1.5;font-family:Inter,sans-serif">${item.ingredients}</p>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }
        };

        document.addEventListener('DOMContentLoaded', () => { app.init(); });
    </script>
</body>
</html>
